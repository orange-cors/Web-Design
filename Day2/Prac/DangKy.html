<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="color: rgb(5, 129, 5); text-align: center;">Phiếu đăng ký tham gia chương trình khuyến mãi</h1>
    <table border="1" style="width: 650px; border-collapse:collapse; background-color: rgb(204, 250, 234);" align="center">
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Họ và tên</td>
            <td><input style="width: 400px;" type="text" value="Nguyễn Ngọc Quỳnh Nga"></td>
        </tr>
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Địa chỉ</td>
            <td><input style="width: 300px;" type="text" value="2Bia Hùng Vương, Q10"></td>
        </tr>
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Điện thoại</td>
            <td><input style="width: 200px;" type="text" value="0348839387"></td>
        </tr>
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Phái</td>
            <td>
                <input type="radio" name="gender" id="Male" value="Male">
                <label for="Male">Nam</label>
                <input type="radio" name="gender" id="Female" value="Female">
                <label for="Female">Nữ</label>
            </td>
        </tr>
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Nghề nghiệp</td>
            <td><select name="Jobs" id="Jobs">
                <option value="Student">Học sinh</option>
                <option value="Teacher">Giáo viên</option>
                <option value="Engineer">Kỹ sư</option>
                <option value="Doctor">Bác sĩ</option>
            </select></td>
        </tr>

        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Chọn sản phẩm tham gia</td>
            <td><select multiple size="4">
            <option>Kem đánh răng</option>
            <option>Bột giặt</option>
            <option>Dầu gội đầu</option>
            <option>Sữa tắm</option>
            </select>
            </td>
        </tr>
        <tr>
            <td style="width: 200px;color: rgb(5, 129, 5)">Số người dự đoán tham gia</td>
            <td><input style="width: 80px;" type="text" value="250000"></td>
        </tr>
        <tr> 
            <td align="center" colspan="2"><input  type="submit" value="Đồng ý"></td>
        </tr>
    </table>
</body>
</html>
